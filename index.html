<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fighter Aircraft Throughout History</title>
  <meta name="description" content="A Pokédex-style field guide to iconic combat aircraft — browse 57+ fighters from the USA, UK, Germany, USSR/Russia, Japan, and France since the 1930s." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="hero">
    <svg class="hero-decor" viewBox="0 0 320 180" aria-hidden="true" focusable="false">
      <circle cx="232" cy="74" r="46" fill="#FFD23F" stroke="#0A1A2B" stroke-width="5"/>
      <g fill="#fff" stroke="#0A1A2B" stroke-width="5" stroke-linejoin="round">
        <path d="M250 132c-10 0-18-7-19-16-2-14 9-23 21-21 3-12 17-16 27-9 8-5 20-1 22 9 12 0 19 11 14 22-3 8-11 12-19 12z"/>
        <path d="M44 60c-9 0-16-6-17-14-1-12 8-20 18-18 3-10 15-14 23-8 7-4 17-1 19 8 10 0 16 9 12 19-3 7-10 11-17 11z"/>
      </g>
    </svg>
    <div class="hero-inner">
      <h1>Fighter Aircraft<br>Throughout&nbsp;History</h1>
      <p class="tagline">A field guide to iconic combat aircraft since the 1930s</p>
    </div>
  </header>

  <div class="toolbar">
    <input id="search" type="search" placeholder="Search name or manufacturer…" />
    <div id="filters" class="filters"></div>
    <label class="sort-label">Sort:
      <select id="sort">
        <option value="dexNo">Dex №</option>
        <option value="yearIntroduced">Year</option>
        <option value="country">Country</option>
      </select>
    </label>
    <span id="count" class="count"></span>
  </div>

  <main id="grid" class="grid"></main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
